<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Important Question 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fff0f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      user-select: none;
    }

    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      animation: floatUp linear infinite;
      opacity: 0.35;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.35; }
      100% { transform: translateY(-110vh) rotate(25deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      background: #fff;
      border-radius: 32px;
      padding: 56px 48px 48px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(255,100,150,0.2), 0 0 0 1px rgba(255,150,180,0.15);
      max-width: 460px;
      width: 90%;
      animation: popIn 0.7s cubic-bezier(0.175,0.885,0.32,1.275) both;
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .bear {
      font-size: 88px;
      display: block;
      margin-bottom: 4px;
      animation: bearWobble 2s ease-in-out infinite;
      transition: all 0.3s;
    }
    @keyframes bearWobble {
      0%,100% { transform: rotate(-4deg) scale(1); }
      50%      { transform: rotate(4deg) scale(1.06); }
    }

    .question {
      font-size: 28px;
      font-weight: 900;
      color: #d63384;
      line-height: 1.3;
      margin-bottom: 40px;
    }

    /* Button wrapper — relative so absolute NO can roam inside viewport */
    .btn-yes {
      background: linear-gradient(135deg, #ff6eb4, #ff2d78);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 900;
      border: none;
      padding: 18px 50px;
      border-radius: 100px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255,45,120,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
      display: inline-block;
      animation: yesPulse 1.5s ease-in-out infinite;
    }
    @keyframes yesPulse {
      0%,100% { box-shadow: 0 10px 30px rgba(255,45,120,0.4); transform: scale(1); }
      50%      { box-shadow: 0 18px 44px rgba(255,45,120,0.6); transform: scale(1.04); }
    }
    .btn-yes:hover {
      transform: scale(1.1) translateY(-3px) !important;
      box-shadow: 0 20px 50px rgba(255,45,120,0.55) !important;
    }

    /* NO — absolutely positioned, runs around the screen */
    .btn-no {
      position: fixed;
      background: #f1f1f1;
      color: #aaa;
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 900;
      border: 2px solid #ddd;
      padding: 14px 36px;
      border-radius: 100px;
      cursor: not-allowed;
      pointer-events: none; /* can never be clicked */
      z-index: 50;
      transition: top 0.18s cubic-bezier(0.34,1.56,0.64,1), left 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }

    .tip {
      margin-top: 24px;
      font-size: 12px;
      color: #ddd;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* YES screen */
    #yes-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ff6eb4, #ff2d78);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeInBig 0.5s ease both;
    }
    @keyframes fadeInBig {
      0%   { opacity: 0; transform: scale(1.08); }
      100% { opacity: 1; transform: scale(1); }
    }
    #yes-screen.show { display: flex; }
    .yes-emoji { font-size: 110px; animation: bounce 0.6s ease infinite alternate; }
    @keyframes bounce {
      0%   { transform: translateY(0) scale(1); }
      100% { transform: translateY(-22px) scale(1.1); }
    }
    .yes-text {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      margin: 20px 0 12px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .yes-sub {
      font-size: 22px;
      color: rgba(255,255,255,0.88);
      font-weight: 700;
      text-align: center;
      padding: 0 24px;
    }

    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="hearts-bg" id="hearts-bg"></div>

<div class="card" id="main-card">
  <span class="bear" id="bear">🐻</span>
  <div class="question">Saloni, will you be<br/>my Girlfriend? 💕</div>
  <button class="btn-yes" onclick="sayYes()">Yes 💖</button>
  <div class="tip">hint: only one button works 😏</div>
</div>

<!-- NO floats freely -->
<button class="btn-no" id="noBtn">No 🙅</button>

<!-- YES screen -->
<div id="yes-screen">
  <div class="yes-emoji">🥰</div>
  <div class="yes-text">Yayyy! 🎉</div>
  <div class="yes-sub">I knew you'd say yes, Saloni! 🥹<br/>You just made me the happiest 🐻❤️</div>
</div>

<script>
  /* ── Floating hearts ── */
  const emojis = ['❤️','💕','💖','💗','🌸','💝','💓','✨'];
  const bg = document.getElementById('hearts-bg');
  for (let i = 0; i < 20; i++) {
    const h = document.createElement('span');
    h.className = 'heart-float';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (16 + Math.random() * 22) + 'px';
    h.style.animationDuration = (6 + Math.random() * 10) + 's';
    h.style.animationDelay = (Math.random() * 8) + 's';
    bg.appendChild(h);
  }

  /* ── NO button: roams randomly, runs from cursor ── */
  const noBtn = document.getElementById('noBtn');
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;
  const NW = 130, NH = 55; // approx button size

  function randPos() {
    return {
      x: Math.random() * (W() - NW - 20) + 10,
      y: Math.random() * (H() - NH - 20) + 10
    };
  }

  let pos = randPos();
  noBtn.style.left = pos.x + 'px';
  noBtn.style.top  = pos.y + 'px';

  // Auto-roam every 1.8s
  setInterval(() => {
    pos = randPos();
    noBtn.style.left = pos.x + 'px';
    noBtn.style.top  = pos.y + 'px';
  }, 1800);

  // Run from mouse/touch
  function runFrom(cx, cy) {
    const bx = pos.x + NW / 2;
    const by = pos.y + NH / 2;
    const dx = bx - cx;
    const dy = by - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 180) {
      // flee in opposite direction
      const angle = Math.atan2(dy, dx);
      let nx = pos.x + Math.cos(angle) * 200;
      let ny = pos.y + Math.sin(angle) * 200;
      // clamp to viewport
      nx = Math.max(10, Math.min(W() - NW - 10, nx));
      ny = Math.max(10, Math.min(H() - NH - 10, ny));
      pos = { x: nx, y: ny };
      noBtn.style.left = nx + 'px';
      noBtn.style.top  = ny + 'px';
    }
  }

  document.addEventListener('mousemove', e => runFrom(e.clientX, e.clientY));
  document.addEventListener('touchmove', e => {
    runFrom(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  /* ── YES ── */
  function sayYes() {
    document.getElementById('yes-screen').classList.add('show');
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#ff6eb4','#ff2d78','#fff','#ffcc00','#ff9900','#a855f7','#22d3ee','#4ade80'];
    for (let i = 0; i < 140; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        const size = 6 + Math.random() * 10;
        c.style.width = size + 'px';
        c.style.height = size + 'px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (2.5 + Math.random() * 3) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 6000);
      }, i * 15);
    }
  }
</script>
</body>
</html>
