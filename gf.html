<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Important Question 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fff0f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating hearts background */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      font-size: 24px;
      animation: floatUp linear infinite;
      opacity: 0.4;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.4; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: #fff;
      border-radius: 32px;
      padding: 60px 52px 52px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(255,100,150,0.18), 0 0 0 1px rgba(255,150,180,0.15);
      max-width: 480px;
      width: 90%;
      animation: popIn 0.7s cubic-bezier(0.175,0.885,0.32,1.275) both;
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .bear {
      font-size: 90px;
      display: block;
      margin-bottom: 8px;
      animation: bearWobble 2s ease-in-out infinite;
    }
    @keyframes bearWobble {
      0%,100% { transform: rotate(-4deg) scale(1); }
      50%      { transform: rotate(4deg) scale(1.05); }
    }

    .question {
      font-size: 30px;
      font-weight: 900;
      color: #d63384;
      line-height: 1.25;
      margin-bottom: 36px;
    }

    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      position: relative;
    }

    /* YES */
    .btn-yes {
      background: linear-gradient(135deg, #ff6eb4, #ff2d78);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 900;
      border: none;
      padding: 18px 42px;
      border-radius: 100px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255,45,120,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-yes:hover {
      transform: scale(1.08) translateY(-3px);
      box-shadow: 0 18px 40px rgba(255,45,120,0.5);
    }

    /* NO — starts huge, shrinks on each hover */
    .btn-no {
      background: #f8f8f8;
      color: #888;
      font-family: 'Nunito', sans-serif;
      font-size: 32px;
      font-weight: 900;
      border: 2.5px solid #e0e0e0;
      padding: 18px 52px;
      border-radius: 100px;
      cursor: pointer;
      transition: font-size 0.2s, padding 0.2s, transform 0.15s;
      position: relative;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .btn-no:active { transform: scale(0.95); }

    /* YES screen */
    #yes-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ff6eb4, #ff2d78);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeInBig 0.5s ease both;
    }
    @keyframes fadeInBig {
      0%   { opacity: 0; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }
    #yes-screen.show { display: flex; }
    .yes-emoji { font-size: 110px; animation: bounce 0.6s ease infinite alternate; }
    @keyframes bounce {
      0%   { transform: translateY(0) scale(1); }
      100% { transform: translateY(-20px) scale(1.1); }
    }
    .yes-text {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      margin: 20px 0 12px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .yes-sub {
      font-size: 22px;
      color: rgba(255,255,255,0.85);
      font-weight: 700;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 200;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .tip {
      margin-top: 28px;
      font-size: 12px;
      color: #ccc;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!-- Floating hearts -->
<div class="hearts-bg" id="hearts-bg"></div>

<!-- Main card -->
<div class="card" id="main-card">
  <span class="bear" id="bear">🐻</span>
  <div class="question">Will you be<br/>my Girlfriend? 💕</div>
  <div class="buttons">
    <button class="btn-yes" onclick="sayYes()">Yes 💖</button>
    <button class="btn-no" id="noBtn" onmouseenter="shrinkNo()" ontouchstart="shrinkNo()">No</button>
  </div>
  <div class="tip">(choose wisely 😏)</div>
</div>

<!-- YES screen -->
<div id="yes-screen">
  <div class="yes-emoji">🥰</div>
  <div class="yes-text">Yayyyy! 🎉</div>
  <div class="yes-sub">I knew you'd say yes! 💕<br/>You just made me the happiest! 🐻❤️</div>
</div>

<script>
  // Floating hearts background
  const emojis = ['❤️','💕','💖','💗','🌸','💝','💓','✨'];
  const bg = document.getElementById('hearts-bg');
  for (let i = 0; i < 22; i++) {
    const h = document.createElement('span');
    h.className = 'heart-float';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (16 + Math.random() * 24) + 'px';
    h.style.animationDuration = (6 + Math.random() * 10) + 's';
    h.style.animationDelay = (Math.random() * 8) + 's';
    bg.appendChild(h);
  }

  // NO shrink logic — every hover makes it smaller, then triggers YES
  let noSize = 32;
  let noClicks = 0;
  const noBtn = document.getElementById('noBtn');
  const bear = document.getElementById('bear');
  const bears = ['🐻','🥺','😢','😭'];

  function shrinkNo() {
    noClicks++;
    noSize = Math.max(0, noSize - 7);
    const pad = Math.max(4, 52 - noClicks * 12);
    noBtn.style.fontSize = noSize + 'px';
    noBtn.style.padding = '14px ' + pad + 'px';
    bear.textContent = bears[Math.min(noClicks, bears.length - 1)];

    // After 4 hovers, just trigger YES anyway
    if (noClicks >= 4 || noSize <= 0) {
      sayYes();
    }
  }

  function sayYes() {
    document.getElementById('yes-screen').classList.add('show');
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#ff6eb4','#ff2d78','#fff','#ffcc00','#ff9900','#a855f7','#22d3ee'];
    for (let i = 0; i < 120; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (6 + Math.random() * 10) + 'px';
        c.style.height = (6 + Math.random() * 10) + 'px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 18);
    }
  }
</script>
</body>
</html>
